services:
  - type: web
    name: shelfpath
    runtime: python
    plan: starter
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHELFPATH_STORAGE
        value: supabase
      - key: SHELFPATH_DEBUG
        value: false
      - key: SHELFPATH_SESSION_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://pkrxfruhnjsifclnhjyc.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
