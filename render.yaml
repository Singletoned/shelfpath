services:
  - type: web
    name: shelfpath
    runtime: python
    plan: starter
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SHELFPATH_STORAGE
        value: supabase
      - key: SHELFPATH_DEBUG
        value: false
      - key: SHELFPATH_SESSION_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://pkrxfruhnjsifclnhjyc.supabase.co
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SHELFPATH_SMTP_HOST
        sync: false
      - key: SHELFPATH_SMTP_USERNAME
        sync: false
      - key: SHELFPATH_SMTP_PASSWORD
        sync: false
      - key: SHELFPATH_SMTP_PORT
        value: 587
      - key: SHELFPATH_MAIL_FROM
        value: Shelfpath <noreply@shelfpath.app>
      - key: SHELFPATH_PUBLIC_URL
        value: https://shelfpath.app
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
