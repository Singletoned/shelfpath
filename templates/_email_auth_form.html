{% if not supabase_url or not supabase_publishable_key %}
<p class="warning">Supabase is not configured for this environment.</p>
{% else %} {% if local_auth_enabled %}
<form
  class="login-form local-login-form"
  method="post"
  action="{{ url_for('local_login') }}"
>
  <input type="hidden" name="next" value="{{ next_url }}" />
  <button type="submit">Sign in as local test user</button>
</form>
<p class="muted local-login-note">Local testing only.</p>
<p class="login-divider">Or continue by email</p>
{% endif %}
<form id="login-form" class="login-form">
  <input type="hidden" id="next-url" value="{{ next_url }}" />
  <label>
    Email address
    <input type="email" id="email" required autocomplete="email" />
  </label>
  <button type="submit">Continue with email</button>
</form>
<p id="login-message" class="muted" aria-live="polite"></p>
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const supabase = createClient(
    "{{ supabase_url }}",
    "{{ supabase_publishable_key }}",
  );
  const form = document.querySelector("#login-form");
  const message = document.querySelector("#login-message");

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const email = document.querySelector("#email").value;
    const next = document.querySelector("#next-url").value || "/";
    const redirectTo = `${window.location.origin}/auth/callback?next=${encodeURIComponent(next)}`;
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: redirectTo },
    });
    if (error) {
      message.textContent = error.message;
      return;
    }
    message.textContent = "Check your email for your Shelfpath link.";
  });
</script>
{% endif %}
