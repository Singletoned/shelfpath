services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shelfpath
      POSTGRES_USER: shelfpath
      POSTGRES_PASSWORD: shelfpath-local-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelfpath -d shelfpath"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - shelfpath-postgres:/var/lib/postgresql/data

  shelfpath:
    build:
      context: .
    command:
      - /bin/sh
      - -ec
      - |
        PYTHONPATH=. /opt/shelfpath-venv/bin/python scripts/migrate_database.py
        PYTHONPATH=. /opt/shelfpath-venv/bin/python scripts/import_catalogue_to_postgres.py
        exec /opt/shelfpath-venv/bin/uvicorn app:app --reload --host 0.0.0.0 --port 8731
    env_file:
      - .env
    environment:
      SHELFPATH_STORAGE: postgres
      DATABASE_URL: postgresql://shelfpath:shelfpath-local-password@postgres:5432/shelfpath
      RESEND_API_KEY: local-development-resend-key
      SHELFPATH_RESEND_API_URL: http://resend-stub:8080
      SHELFPATH_MAIL_FROM: Shelfpath <noreply@shelfpath.test>
      SHELFPATH_PUBLIC_URL: http://127.0.0.1:8731
      SHELFPATH_INVITATION_TOKEN_SECRET: local-development-invitation-secret
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8731/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      resend-stub:
        condition: service_healthy
    ports:
      - 127.0.0.1:8731:8731
    volumes:
      - .:/app

  resend-stub:
    image: python:3.12-alpine
    command: python /workspace/tests/resend_stub.py
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - .:/workspace:ro

volumes:
  shelfpath-postgres:
