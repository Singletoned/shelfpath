services:
  shelfpath:
    build:
      context: .
    env_file:
      - local-supabase.env
    environment:
      SHELFPATH_STORAGE: supabase
      SUPABASE_URL: http://supabase_kong_shelfpath:8000
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8731/health')"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    networks:
      - supabase
    ports:
      - 127.0.0.1:8731:8731
    volumes:
      - .:/app

networks:
  supabase:
    external: true
    name: supabase_network_shelfpath
