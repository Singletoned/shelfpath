services:
  shelfpath:
    build:
      context: .
    env_file:
      - local-supabase.env
    environment:
      SHELFPATH_STORAGE: supabase
      SUPABASE_URL: http://host.docker.internal:54321
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8731/health')"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    ports:
      - 127.0.0.1:8731:8731
    volumes:
      - .:/app
