services:
  shelfpath:
    build:
      context: .
    command:
      - /opt/shelfpath-venv/bin/uvicorn
      - app:app
      - --reload
      - --host
      - 0.0.0.0
      - --port
      - "8731"
    env_file:
      - local-supabase.env
    environment:
      SHELFPATH_STORAGE: supabase
      SUPABASE_URL: http://supabase_kong_shelfpath:8000
      RESEND_API_KEY: local-development-resend-key
      SHELFPATH_RESEND_API_URL: http://resend-stub:8080
      SHELFPATH_MAIL_FROM: Shelfpath <noreply@shelfpath.test>
      SHELFPATH_PUBLIC_URL: http://127.0.0.1:8731
      SHELFPATH_INVITATION_TOKEN_SECRET: local-development-invitation-secret
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8731/health')"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    depends_on:
      resend-stub:
        condition: service_healthy
    networks:
      - app
      - supabase
    ports:
      - 127.0.0.1:8731:8731
    volumes:
      - .:/app

  resend-stub:
    image: python:3.12-alpine
    command: python /workspace/tests/resend_stub.py
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - app
    volumes:
      - .:/workspace:ro
    ports:
      - 127.0.0.1:8025:8025

networks:
  app:
  supabase:
    external: true
    name: supabase_network_shelfpath
