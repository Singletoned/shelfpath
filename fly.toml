app = "shelfpath"
primary_region = "lhr"

[build]
dockerfile = "Dockerfile"

[env]
OPENAI_MODEL = "gpt-4.1-mini"
SHELFPATH_DEBUG = "false"
SHELFPATH_MAIL_FROM = "Shelfpath <noreply@shelfpath.app>"
SHELFPATH_PUBLIC_URL = "https://shelfpath.app"
SHELFPATH_SMTP_PORT = "587"
SHELFPATH_STORAGE = "supabase"
SUPABASE_URL = "https://pkrxfruhnjsifclnhjyc.supabase.co"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "15s"
method = "GET"
timeout = "5s"
path = "/health"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
