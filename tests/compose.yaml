name: shelfpath-tests

services:
  shelfpath:
    build:
      context: ..
    env_file:
      - ../local-supabase.env
    environment:
      SHELFPATH_STORAGE: supabase
      SUPABASE_URL: http://supabase_kong_shelfpath:8000
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8731/health')"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    networks:
      - test
      - supabase
    volumes:
      - ..:/app

  e2e:
    build:
      context: ../e2e
    command:
      - python
      - -m
      - unittest
      - discover
      - -s
      - e2e
    depends_on:
      shelfpath:
        condition: service_healthy
    environment:
      SHELFPATH_E2E_BASE_URL: http://shelfpath:8731
    networks:
      - test
    volumes:
      - ..:/workspace:ro
    working_dir: /workspace

networks:
  test:
  supabase:
    external: true
    name: supabase_network_shelfpath
