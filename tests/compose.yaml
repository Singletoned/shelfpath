name: shelfpath-tests

services:
  shelfpath:
    build:
      context: ..
    command:
      - /opt/shelfpath-venv/bin/uvicorn
      - app:app
      - --host
      - 0.0.0.0
      - --port
      - "8731"
    env_file:
      - ../local-supabase.env
    environment:
      SHELFPATH_STORAGE: supabase
      SUPABASE_URL: http://supabase_kong_shelfpath:8000
      SHELFPATH_SMTP_HOST: mailpit
      SHELFPATH_SMTP_PORT: 1025
      SHELFPATH_MAIL_FROM: Shelfpath <noreply@shelfpath.test>
      SHELFPATH_PUBLIC_URL: http://shelfpath:8731
      SHELFPATH_INVITATION_TOKEN_SECRET: local-e2e-invitation-secret
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8731/health')"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    depends_on:
      mailpit:
        condition: service_healthy
    networks:
      - test
      - supabase
    volumes:
      - ..:/app

  mailpit:
    image: axllent/mailpit:v1.27
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:8025/readyz"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - test

  e2e:
    build:
      context: ../e2e
    command:
      - python
      - -m
      - unittest
      - discover
      - -s
      - e2e
    depends_on:
      shelfpath:
        condition: service_healthy
    environment:
      SHELFPATH_E2E_BASE_URL: http://shelfpath:8731
      SHELFPATH_E2E_SUPABASE_URL: http://supabase_kong_shelfpath:8000
      SHELFPATH_INVITATION_TOKEN_SECRET: local-e2e-invitation-secret
    env_file:
      - ../local-supabase.env
    networks:
      - test
      - supabase
    volumes:
      - ..:/workspace:ro
    working_dir: /workspace

networks:
  test:
  supabase:
    external: true
    name: supabase_network_shelfpath
